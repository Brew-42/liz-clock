<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liz Clock</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #F5EEDC; /* soft beige */
        font-family: 'Alice', serif;
        color: #000;
        overflow: hidden;
    }

    @font-face {
        font-family: 'Alice';
        src: url('Alice-Regular.ttf');
    }

    /* TIME (only for general quotes) */
    #timeDisplay {
        position: absolute;
        top: 40px;
        left: 40px;
        font-size: 72px;
        font-family: 'Alice';
        display: none;
        opacity: 0;
        transition: opacity 1s ease;
    }

    /* QUOTE BLOCK */
    #quoteText {
        position: absolute;
        width: 900px;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -55%); /* upward shift */
        font-size: 64px;
        line-height: 1.25;
        text-align: center;
        opacity: 0;
        transition: opacity 1s ease;
    }

    /* ATTRIBUTION */
    #attribution {
        position: absolute;
        right: 90px;
        bottom: 50px;
        width: 600px;
        font-size: 30px;
        text-align: right;
        opacity: 0.75;
        font-family: 'Alice';
        opacity: 0;
        transition: opacity 1s ease;
    }
</style>

</head>
<body>

<div id="timeDisplay"></div>
<div id="quoteText"></div>
<div id="attribution"></div>

<script>
async function loadQuotes() {
    const response = await fetch("quotes.json");
    return await response.json();
}

function getCurrentMinuteOfDay() {
    const now = new Date();
    return now.getHours() * 60 + now.getMinutes();
}

function formatTime() {
    const now = new Date();
    let hours = now.getHours();
    let minutes = now.getMinutes().toString().padStart(2, "0");

    let displayHour = hours % 12;
    if (displayHour === 0) displayHour = 12;

    return `${displayHour}:${minutes}`;
}

/* 20% chance to override with a general quote */
function shouldUseGeneralQuote() {
    return Math.random() < 0.20;
}

function pickQuote(quotes) {
    const minute = getCurrentMinuteOfDay();

    const timeQuotes = quotes.filter(q => q.tag === "time" && q.minute_of_day === minute);
    const generalQuotes = quotes.filter(q => q.tag === "general");

    if (timeQuotes.length > 0 && !shouldUseGeneralQuote()) {
        return timeQuotes[Math.floor(Math.random() * timeQuotes.length)];
    }

    return generalQuotes[Math.floor(Math.random() * generalQuotes.length)];
}

function buildAttribution(q) {
    const author = q.author ? q.author.trim() : "";
    const source = q.source ? q.source.trim() : "";

    if (author && source) return `~ ${author} ~ ${source}`;
    if (author) return `~ ${author}`;
    if (source) return `~ ${source}`;
    return "";
}

function fadeIn(el) {
    el.style.opacity = 1;
}

function fadeOut(el) {
    el.style.opacity = 0;
}

function renderQuote(q) {
    const timeEl = document.getElementById("timeDisplay");
    const quoteEl = document.getElementById("quoteText");
    const attrEl = document.getElementById("attribution");

    fadeOut(timeEl);
    fadeOut(quoteEl);
    fadeOut(attrEl);

    setTimeout(() => {
        quoteEl.textContent = "“" + q.text + "”";

        const attribution = buildAttribution(q);
        attrEl.textContent = attribution;

        if (q.tag === "general") {
            timeEl.style.display = "block";
            timeEl.textContent = formatTime();
        } else {
            timeEl.style.display = "none";
        }

        fadeIn(quoteEl);
        fadeIn(attrEl);
        if (q.tag === "general") fadeIn(timeEl);

    }, 500);
}

async function startClock() {
    const quotes = await loadQuotes();
    renderQuote(pickQuote(quotes));

    setInterval(() => {
        renderQuote(pickQuote(quotes));
    }, 60000);
}

startClock();
</script>

</body>
</html>
